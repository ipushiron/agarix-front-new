<!DOCTYPE html>
<html>
  <head>
    <title>Agarix</title>
    <link rel="preconnect" href="https://fonts.gstatic.com">
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lato&display=swap" rel="stylesheet">
    <script async defer="defer" src="https://connect.facebook.net/en_US/sdk.js"></script>
    <script async defer="defer" src="https://apis.google.com/js/client:platform.js?onload=gapiAsyncInit"></script>
    <script async defer="defer" src="https://www.google.com/recaptcha/api.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="ReCaptchaV3"></div>
    <div id="ReCaptchaV2"></div>
    <div id="root"></div>
    <script>
      const isDev = false;
      const loadDevBundle = true;

      const appendScript = (src) => {
          const script = document.createElement('script');
          script.src = src;
          document.body.appendChild(script);
      }

      if (isDev) {
          loadDevBundle && appendScript('https://urdevurl.example.com/bundle.js');
      } else {
          appendScript('https://ipushiron.github.io/ix/bundle.js');
      }
    </script>
  </body>
</html>
